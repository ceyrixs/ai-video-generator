<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: white;
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-size: 3em;
        }
        section {
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .social-buttons {
            display: flex;
            justify-content: center;
        }
        .social-button {
            background-color: #4c68d7;
            color: white;
        }
        .social-button:hover {
            background-color: #3b5bb6;
        }
    </style>
</head>
<body>
    <h1>AI Video Generator</h1>
    <section>
        <h2>Create Amazing Videos</h2>
        <p>Features:
            <ul>
                <li>Text-to-Video</li>
                <li>Image-to-Video</li>
                <li>Video Editing</li>
            </ul>
        </p>
        <button>Create Video</button>
        <button>Edit Video</button>
    </section>
    <section>
        <h2>Share Your Creations</h2>
        <div class="social-buttons">
            <button class="social-button">Share on TikTok</button>
            <button class="social-button">Share on Instagram</button>
            <button class="social-button">Share on YouTube</button>
            <button class="social-button">Share on Facebook</button>
        </div>
    </section>
</body>
</html>
