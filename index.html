<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>AI Video Generator</h1>
    </header>
    <main>
        <section id="text-to-video">
            <h2>Text to Video</h2>
            <textarea id="textInput" placeholder="Type your script here..."></textarea>
            <button id="generateVideo">Generate Video</button>
            <video id="generatedVideo" controls></video>
        </section>
        <section id="image-to-video">
            <h2>Image to Video</h2>
            <input type="file" id="imageInput" accept="image/*">
            <button id="createVideoFromImage">Create Video</button>
            <video id="imageVideo" controls></video>
        </section>
        <section id="video-editing">
            <h2>Video Editing</h2>
            <input type="file" id="videoUpload" accept="video/*">
            <button id="editVideo">Edit Video</button>
            <video id="editedVideo" controls></video>
        </section>
    </main>
    <footer>
        <button id="installPWA">Install App</button>
        <div id="socialSharing">
            <h3>Share on Social Media</h3>
            <button id="shareFacebook">Share on Facebook</button>
            <button id="shareTwitter">Share on Twitter</button>
        </div>
    </footer>
</body>
</html>
